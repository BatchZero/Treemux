name: Treemux

options:
  bundleIdPrefix: com.batchzero
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  Citadel:
    url: https://github.com/orlandos-nl/Citadel
    from: "0.9.2"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    exactVersion: "2.7.3"
  CodeEditSourceEditor:
    url: https://github.com/CodeEditApp/CodeEditSourceEditor
    exactVersion: "0.15.2"
  # Override the transitive CodeEditTextView dependency with our BatchZero fork
  # that patches a wrapping bug where the typesetter built each non-first
  # wrapped fragment's CTLine using `lineBreak` as a length instead of as an
  # absolute offset. Upstream issue: chars at the end of a wrapped visual line
  # appeared duplicated at the start of the next wrapped sub-line. Pinned to a
  # specific commit; remove this override once a fixed upstream release ships.
  CodeEditTextView:
    url: https://github.com/BatchZero/CodeEditTextView
    revision: a2922cef1ef6b1972549f1f7d02f4e40a8e34a78

settings:
  base:
    SWIFT_VERSION: "5"
    MARKETING_VERSION: "0.0.13"
    CURRENT_PROJECT_VERSION: "13"

targets:
  Treemux:
    type: application
    platform: macOS
    sources:
      - path: Treemux
        excludes:
          - Info.plist
          - Vendor
          - ghostty
          - terminfo
          - Support/AIHooks
      - path: Treemux/Support/AIHooks
        type: folder
    dependencies:
      - framework: Treemux/Vendor/GhosttyKit.xcframework
        embed: false
      - package: Citadel
        product: Citadel
      - package: Sparkle
        product: Sparkle
      - package: CodeEditSourceEditor
        product: CodeEditSourceEditor
    postBuildScripts:
      - name: Copy Ghostty Resources
        script: |
          set -e
          RESOURCE_ROOT="$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH"
          mkdir -p "$RESOURCE_ROOT/ghostty" "$RESOURCE_ROOT/terminfo"
          rsync -a "$SRCROOT/Treemux/ghostty/" "$RESOURCE_ROOT/ghostty/"
          rsync -a "$SRCROOT/Treemux/terminfo/" "$RESOURCE_ROOT/terminfo/"
    info:
      path: Treemux/Info.plist
      properties:
        CFBundleDevelopmentRegion: en
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSApplicationCategoryType: public.app-category.developer-tools
        NSHumanReadableCopyright: "Copyright \u00A9 2026 BatchZero. MIT License."
        NSPrincipalClass: NSApplication
        SUFeedURL: "https://raw.githubusercontent.com/BatchZero/Treemux/stable/sparkle-feed.xml"
        SUPublicEDKey: "bfBuujWR9izxMmCzjuTzRkcvqdLe8c+uaGU/visxZbk="
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.batchzero.treemux
        PRODUCT_NAME: Treemux
        ENABLE_APP_SANDBOX: NO
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        OTHER_LDFLAGS: ["-lc++", "-framework", "Carbon"]
        LD_RUNPATH_SEARCH_PATHS: ["$(inherited)", "@executable_path/../Frameworks"]

  TreemuxTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: TreemuxTests
    dependencies:
      - target: Treemux
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.batchzero.treemux.tests
        GENERATE_INFOPLIST_FILE: YES
