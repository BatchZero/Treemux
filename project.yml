name: Treemux

options:
  bundleIdPrefix: com.batchzero
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  Citadel:
    url: https://github.com/orlandos-nl/Citadel
    from: "0.9.2"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    exactVersion: "2.7.3"

settings:
  base:
    SWIFT_VERSION: "5"
    MARKETING_VERSION: "0.0.1"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Treemux:
    type: application
    platform: macOS
    sources:
      - path: Treemux
        excludes:
          - Info.plist
          - Vendor
          - ghostty
          - terminfo
    dependencies:
      - framework: Treemux/Vendor/GhosttyKit.xcframework
        embed: false
      - package: Citadel
        product: Citadel
      - package: Sparkle
        product: Sparkle
    postBuildScripts:
      - name: Copy Ghostty Resources
        script: |
          set -e
          RESOURCE_ROOT="$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH"
          mkdir -p "$RESOURCE_ROOT/ghostty" "$RESOURCE_ROOT/terminfo"
          rsync -a "$SRCROOT/Treemux/ghostty/" "$RESOURCE_ROOT/ghostty/"
          rsync -a "$SRCROOT/Treemux/terminfo/" "$RESOURCE_ROOT/terminfo/"
    info:
      path: Treemux/Info.plist
      properties:
        CFBundleDevelopmentRegion: en
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSApplicationCategoryType: public.app-category.developer-tools
        NSHumanReadableCopyright: "Copyright \u00A9 2026 BatchZero. MIT License."
        NSPrincipalClass: NSApplication
        SUFeedURL: "https://raw.githubusercontent.com/BatchZero/Treemux/stable/appcast.xml"
        SUPublicEDKey: "bfBuujWR9izxMmCzjuTzRkcvqdLe8c+uaGU/visxZbk="
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.batchzero.treemux
        PRODUCT_NAME: Treemux
        ENABLE_APP_SANDBOX: NO
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        OTHER_LDFLAGS: ["-lc++", "-framework", "Carbon"]
        LD_RUNPATH_SEARCH_PATHS: ["$(inherited)", "@executable_path/../Frameworks"]

  TreemuxTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: TreemuxTests
    dependencies:
      - target: Treemux
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.batchzero.treemux.tests
        GENERATE_INFOPLIST_FILE: YES
